<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Report</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  </head>
  <body>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

<form id="reportForm">

  <input id="report_date" type="date" required />

  <input id="project" type="text" required />

  <input id="hours" type="number" step="0.25" min="0.25" required />

  <textarea id="summary" required></textarea>

  <textarea id="blockers"></textarea>

  <textarea id="notes"></textarea>

  <button type="submit">Submit</button>

  <button type="button" id="cancelButton">Cancel</button>

</form>

<script>

  const tg = window.Telegram.WebApp;

  tg.ready();

  tg.expand();

  document.querySelector("#reportForm").addEventListener("submit", function (event) {

    event.preventDefault();

    const payload = {

      action: "submit",

      report_date: document.querySelector("#report_date").value,

      project: document.querySelector("#project").value,

      hours: Number(document.querySelector("#hours").value),

      summary: document.querySelector("#summary").value,

      blockers: document.querySelector("#blockers").value || "",

      notes: document.querySelector("#notes").value || "",

      submitted_at: new Date().toISOString()

    };

    tg.sendData(JSON.stringify(payload));

    tg.close();

  });

  document.querySelector("#cancelButton").addEventListener("click", function () {

    const payload = {

      action: "cancel",

      reason: "user_cancelled",

      cancelled_at: new Date().toISOString()

    };

    tg.sendData(JSON.stringify(payload));

    tg.close();

  });

</script>
  </body>
</html>
